<!doctype html>

<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Pet API Tester</title>

    <style>
      body {
        font-family: Arial;
        background: #111;
        color: #eee;
        padding: 40px;
      }

      form {
        display: flex;
        flex-direction: column;
        max-width: 400px;
        gap: 10px;
      }

      input,
      button {
        padding: 8px;
        border-radius: 4px;
        border: none;
      }

      button {
        background: #4caf50;
        color: white;
        cursor: pointer;
      }

      pre {
        background: #222;
        padding: 15px;
        margin-top: 20px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h2>Create Pet (API Test)</h2>

    <form id="petForm">
      <label>User ID</label> <input type="number" name="user_id" required />

      <label>Name</label> <input type="text" name="name" required />

      <label>Species</label> <input type="text" name="species" required />

      <label>Breed</label> <input type="text" name="breed" required />

      <label>Weight</label>
      <input type="number" step="0.01" name="weight" required />

      <label>Death Date (optional)</label>
      <input type="date" name="death_date" />

      <label>Image (optional)</label>
      <input type="file" name="image" accept=".png,.jpg,.jpeg" />

      <button type="submit">Create Pet</button>
    </form>

    <h3>Response</h3>
    <pre id="response">Waiting...</pre>

    <script>
      const form = document.getElementById("petForm");
      const responseBox = document.getElementById("response");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form);

        try {
          const res = await fetch("http://localhost:8080/api/pets", {
            method: "POST",
            body: formData,
          });

          const text = await res.text();

          try {
            const json = JSON.parse(text);
            responseBox.textContent = JSON.stringify(json, null, 2);
          } catch {
            responseBox.textContent = text;
          }
        } catch (err) {
          responseBox.textContent = err;
        }
      });
    </script>
  </body>
</html>
